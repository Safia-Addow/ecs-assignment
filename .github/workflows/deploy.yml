name: ECS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    concurrency:
      group: terraform
      cancel-in-progress: true

    outputs:
      sha: ${{ steps.set_sha.outputs.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set git SHA
        id: set_sha
        run: echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          tflint --version

  lint:
    name: Terraform Lint & Validate
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Install tflint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
     
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::769278709379:role/github-oidc-role
          aws-region: eu-west-2

      - name: Terraform fmt
        run: terraform -chdir=infra fmt

      - name: Terraform fmt check
        run: terraform -chdir=infra fmt -check

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: TFLint
        run: tflint --chdir=infra

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: setup  

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::769278709379:role/github-oidc-role
          aws-region: eu-west-2

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-west-2 | \
          docker login --username AWS --password-stdin 769278709379.dkr.ecr.eu-west-2.amazonaws.com

      - name: Build Docker image
        run: |
          docker build \
            -t 769278709379.dkr.ecr.eu-west-2.amazonaws.com/ecs-assignment:${{ needs.setup.outputs.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push \
            769278709379.dkr.ecr.eu-west-2.amazonaws.com/ecs-assignment:${{ needs.setup.outputs.sha }}

  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: [lint, build-and-push]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::769278709379:role/github-oidc-role
          aws-region: eu-west-2

      - name: Create tfvars file
        run: |
          cat <<EOF > infra/terraform.tfvars
          api_key="${{ secrets.API_KEY }}"
          db_password="${{ secrets.DB_PASSWORD }}"
          image_tag="${{ needs.setup.outputs.sha }}"
          EOF

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform -chdir=infra init -backend-config="bucket=ecs-assignment-tf-state-769278709379" -backend-config="region=eu-west-2"

      - name: Terraform Plan (with retry)
        run: |
          ATTEMPTS=0
          until [ $ATTEMPTS -ge 3 ]
          do
            terraform -chdir=infra plan \
              -var="image_tag=${{ needs.setup.outputs.sha }}" \
              -lock-timeout=60s \
              -out=tfplan && break
            ATTEMPTS=$((ATTEMPTS+1))
            echo "Retrying Terraform plan in 10s..."
            sleep 10
          done
          if [ $ATTEMPTS -eq 3 ]; then
            echo "Terraform plan failed after 3 attempts."
            exit 1
          fi

      - name: Terraform Apply
        run: terraform -chdir=infra apply -auto-approve tfplan

  post-deploy:
    name: Post-Deploy Check
    runs-on: ubuntu-latest
    needs: terraform-deploy

    steps:
      - name: Check application health
        run: |
          echo "Waiting for service to stabilize..."
          sleep 60

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tm.ecs.safiaaddow.uk/health)

          if [ "$STATUS" != "200" ]; then
            echo "Application is not healthy! Status: $STATUS"
            exit 1
          else
            echo "Application is healthy!"
          fi