name: Terraform Deploy

on:
  workflow_dispatch:

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TF_VAR_api_key: ${{ secrets.API_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Get latest image tag from ECR
        id: image
        run: |
          IMAGE_TAG=$(aws ecr describe-images \
            --repository-name ecs-assignment \
            --region eu-west-2 \
            --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
            --output text)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform -chdir=infra init

      - name: Terraform Apply (Deploy ECS)
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var="image_tag=$IMAGE_TAG"

  post-deploy:
    name: Post-Deploy Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Check application health
        run: |
          echo "Waiting for service to stabilize..."

          ATTEMPTS=0
          MAX_ATTEMPTS=10

          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" [tm.ecs.safiaaddow.uk](https://tm.ecs.safiaaddow.uk/health)

            if [ "$STATUS" = "200" ]; then
              echo "Application is healthy!"
              exit 0
            fi

            echo "Attempt $ATTEMPTS: Status $STATUS, retrying in 15s..."
            sleep 15
            ATTEMPTS=$((ATTEMPTS+1))
          done

          echo "Application is not healthy after retries!"
          exit 1
