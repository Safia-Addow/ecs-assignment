name: Build and Push Docker Image

on:
  push:
    branches:
      - main

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TF_VAR_api_key: ${{ secrets.API_KEY }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v3

      # -------------------------
      # AWS AUTH (ACCESS KEYS)
      # -------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # -------------------------
      # LOGIN TO ECR
      # -------------------------
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-west-2 | \
          docker login --username AWS --password-stdin 769278709379.dkr.ecr.eu-west-2.amazonaws.com

      # -------------------------
      # BUILD IMAGE
      # -------------------------
      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t 769278709379.dkr.ecr.eu-west-2.amazonaws.com/ecs-assignment:${{ github.sha }} \
            .

      # -------------------------
      # PUSH IMAGE
      # -------------------------
      - name: Push Docker image
        run: |
          docker push \
            769278709379.dkr.ecr.eu-west-2.amazonaws.com/ecs-assignment:${{ github.sha }}